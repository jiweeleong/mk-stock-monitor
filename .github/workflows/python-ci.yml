name: Stock Monitor CI

on:
  # 1. 手动触发（支持选择是否立即执行）
  workflow_dispatch:
    inputs:
      run_now:
        description: '是否立即执行（--now）'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

  # 2. 代码推送到 main 分支时自动触发
  push:
    branches: [ main ]

  # 3. 定时触发（每天 18:00 执行，对应 UTC 10:00）
  schedule:
    - cron: '0 10 * * *'   # UTC 10:00 = 北京时间 18:00

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Run stock monitor
        run: |
          if [ "${{ github.event.inputs.run_now }}" = "true" ]; then
            python main.py --now
          else
            python main.py
          fi
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
