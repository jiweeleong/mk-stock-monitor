name: Stock Monitor CI

on:
  # 1. 手动触发（在 Actions 页面点击 "Run workflow"）
  workflow_dispatch:

  # 2. 代码推送到 main 分支时自动触发
  push:
    branches: [ main ]

  # 3. 定时触发（每天北京时间 9:00 运行一次，UTC 时间 1:00）
  schedule:
    - cron: '0 1 * * *'   # UTC 1:00 = 北京时间 9:00

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      # 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'   # 可根据你的实际版本调整

      # 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 运行主程序（使用环境变量传入敏感信息）
      - name: Run stock monitor
        run: python main.py --now
        env:
          # 从 GitHub Secrets 中读取密钥，在脚本中用 os.getenv("API_KEY") 获取
          API_KEY: ${{ secrets.STOCK_API_KEY }}
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
